name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Cache Oriedita jar
        uses: actions/cache@v4
        with:
          path: mcp_harness/oriedita
          key: oriedita-1.1.3

      - name: Install Python build/test deps
        run: python -m pip install --upgrade pip pybind11 pytest

      - name: Build + run regression suite
        run: make PYTHON=python test
